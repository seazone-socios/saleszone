name: Review Semanal de Calls

on:
  schedule:
    - cron: '0 19 * * 5' # Sexta 16h BRT (19h UTC)
  workflow_dispatch:
    inputs:
      days_back:
        description: 'Dias para buscar (default 7)'
        required: false
        default: '7'
      dry_run:
        description: 'Apenas simular (true/false)'
        required: false
        default: 'false'

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run review semanal
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_DM_CHANNEL: 'D07M0MKUJUS'
          DAYS_BACK: ${{ inputs.days_back || '7' }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: python scripts/review_calls_semanal.py

      - name: Summary
        if: always()
        run: |
          if [ -f /tmp/review_summary.txt ]; then
            cat /tmp/review_summary.txt >> $GITHUB_STEP_SUMMARY
          else
            echo "## Review Semanal de Calls" >> $GITHUB_STEP_SUMMARY
            echo "Nenhum summary gerado." >> $GITHUB_STEP_SUMMARY
          fi
